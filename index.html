    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "どれくらい大きくなりますか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "個体差はありますが、男の子で30kg程度、女の子で25kg程度になります。"
          }
        },
        {
          "@type": "Question",
          "name": "匂いは気になりますか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "月に1、2回程度のシャンプーでほとんど気になりません。"
          }
        },
        {
          "@type": "Question",
          "name": "トリミングは必要ですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "毛が伸び続ける犬種ではないので基本不要ですが、足元・足の裏などは定期的なカットが必要です。"
          }
        },
        {
          "@type": "Question",
          "name": "抜け毛やメンテナンスはどのような感じですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "日々ブラッシングは必要です。換毛期（年に2度程度）には一気に毛が生え変わるため、集中的なケアが必要です。"
          }
        },
        {
          "@type": "Question",
          "name": "運動量はどれくらい必要ですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "毎日朝夕1時間程度のお散歩が理想です。"
          }
        },
        {
          "@type": "Question",
          "name": "お留守番はできますか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "犬種の特徴としてお留守番は苦手です。常にワンちゃんのそばに人がいる環境がおすすめです。"
          }
        }
      ]
    }
